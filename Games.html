<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>🎄 The Sunken Fate – Games 🎄</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a1929;
      --surface: #0d2b1e;
      --card: #1a3a2a;
      --accent: #dc143c;
      --light: #ffffff;
      --grey: #c8e6c9;
      --radius: 12px;
      --max: 1100px;
    }

    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; max-width: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--light);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* Enhanced Snow Effect */
    .snowflake {
      position: fixed;
      top: -10px;
      z-index: 1000;
      color: var(--light);
      user-select: none;
      pointer-events: none;
      animation: snowfall linear infinite;
      font-size: 1rem;
    }
    @keyframes snowfall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0.3; }
    }

    /* Christmas Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1.25rem; background: var(--surface);
      border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 10;
    }
    .logo {
      font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 1.5rem;
      color: var(--accent); letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
    }
    #ham { display: none; background: none; border: none; color: var(--light); font-size: 1.4rem; cursor: pointer; }
    nav a { color: var(--light); text-decoration: none; margin-left: 1.25rem; font-weight: 600; transition: color .2s; }
    nav a:hover { color: var(--accent); }

    /* Christmas Title */
    h1 {
      font-family: 'Orbitron', sans-serif; font-size: 2.2rem; text-align: center;
      margin: 2.5rem 0 1.5rem; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent) 0%, #ffd700 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
    }

    /* Christmas Game Grid */
    .grid {
      display: grid; gap: 1.25rem;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      padding: 0 1rem; max-width: var(--max); margin: auto auto 3rem;
    }
    .card {
      background: var(--card); border-radius: var(--radius); overflow: hidden;
      text-align: center; transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
      text-decoration: none; color: var(--light);
      border: 1px solid rgba(220, 20, 60, .15);
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      position: relative;
    }
    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 15px 30px rgba(220, 20, 60, .25);
      border-color: rgba(220, 20, 60, .4);
    }
    .card::before {
      content: '🎁';
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 1.2rem;
      z-index: 2;
      filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.8));
    }
    .card img {
      height: 130px; object-fit: cover; width: 100%;
      border-bottom: 2px solid rgba(220, 20, 60, .3);
    }
    .label {
      display: block; padding: .7rem .5rem; font-weight: 600; font-size: 1rem;
      background: linear-gradient(135deg, var(--light), #ffb3a0);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .cat-flag {
      display: inline-block; margin-top: .25rem; padding: .2rem .6rem;
      background: var(--accent); color: var(--light); font-size: .65rem;
      border-radius: 4px; text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(220, 20, 60, 0.4);
    }

    /* Christmas Footer */
    footer {
      text-align: center; padding: 2rem 1rem; font-size: .85rem;
      background: var(--surface); color: var(--grey);
      border-top: 2px solid var(--accent);
    }

    /* Mobile Nav */
    @media (max-width: 700px) {
      nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--accent); }
      nav.open { display: flex; }
      #ham { display: block; }
      nav a { margin: 0; padding: .8rem 1.2rem; border-bottom: 1px solid rgba(220, 20, 60, .3); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎄 THE SUNKEN FATE 🎄</div>
  <button id="ham">☰</button>
  <nav id="nav">
    <a href="index.html">🏠 Home</a>
    <a href="Games.html">🎮 Games</a>
    <a href="prox.html">🎁 Pr0xy</a>
    <a href="Settings.html">⚙️ Settings</a>
    <a href="About.html">About</a>
  </nav>
</header>

<h1>🎅 Games 🎄</h1>
<div class="grid" id="gameGrid"></div>

<footer>🎄 © <span id="yr"></span> The Sunken Fate | Merry Christmas & Happy Gaming! 🎁</footer>

<script>
  // Enhanced Snow Effect
  function createSnowflake() {
    const snowflake = document.createElement('div');
    snowflake.classList.add('snowflake');
    snowflake.innerHTML = '❄️';
    snowflake.style.left = Math.random() * window.innerWidth + 'px';
    snowflake.style.animationDuration = Math.random() * 3 + 5 + 's';
    snowflake.style.opacity = Math.random();
    snowflake.style.fontSize = Math.random() * 10 + 10 + 'px';
    document.body.appendChild(snowflake);
    setTimeout(() => snowflake.remove(), 8000);
  }
  setInterval(createSnowflake, 300);

  // Mobile nav
  document.getElementById('ham').onclick = () => document.getElementById('nav').classList.toggle('open');
  
  // Year
  document.getElementById('yr').textContent = new Date().getFullYear();

  // Load games from games-data.js
  fetch('games-data.js')
    .then(r => r.ok ? r.text() : Promise.reject())
    .then(txt => { eval(txt); return GAMES; })
    .then(list => {
      const grid = document.getElementById('gameGrid');
      list.forEach(g => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = g.path;
        card.innerHTML = `
          <img src="${g.image}" alt="${g.title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 320 130\'%3E%3Crect fill=\'%23444\' width=\'320\' height=\'130\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' dy=\'.3em\' fill=\'%23dc143c\' font-family=\'Orbitron\' font-size=\'22\'%3E${g.title}%3C/text%3E%3C/svg%3E'">
          <span class="label">${g.title}<br><span class="cat-flag">${g.category}</span></span>
        `;
        grid.appendChild(card);
      });
    })
    .catch(() => {}); // silent fail → empty grid
</script>

</body>
</html>
